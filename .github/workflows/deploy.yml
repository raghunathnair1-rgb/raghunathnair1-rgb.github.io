name: Deploy (Rust/WASM → Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue runs instead of cancelling: a frequent telemetry deploy must never kill an
# in-progress code build/deploy. Runs serialize on the "pages" group (no pile-up at
# the ~5-min cron cadence since a build+deploy finishes in well under 5 min).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/trunk-action@v0.5.0
      - name: Build WASM
        run: trunk build --release || { echo "::warning::build failed — retrying once (transient CI flake)"; sleep 5; trunk build --release; }
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

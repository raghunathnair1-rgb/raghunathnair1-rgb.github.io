name: Deploy (Rust/WASM → Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Latest-wins: cancel any in-progress run when a newer commit arrives. Safe here because
# telemetry commits STACK on top of code commits, so the NEWEST commit always contains all
# content — a cancelled build's changes still ship via the next build. 'false' (queue) caused
# thrashing: with a 5-min telemetry cron flooding the group, pending runs kept getting
# superseded and nothing deployed. Builds finish in ~90s, well inside the cron gap.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  coverage:
    name: 100% coverage gate (blog-logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      # Gate ONLY the pure-logic crate at 100% lines. It has no web deps, so it builds and
      # tests on the native host (no wasm target / browser needed). A drop below 100% fails
      # this job, which blocks `build` (needs: coverage) and therefore the deploy.
      - name: cargo llvm-cov — fail under 100% lines
        run: cargo llvm-cov -p blog-logic --lib --fail-under-lines 100 --summary-only

  build:
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/trunk-action@v0.5.0
      - name: Build WASM (resilient to transient CI/registry flakes)
        run: |
          # No Cargo.lock is committed, so deps resolve fresh each run — this makes the build
          # occasionally sensitive to registry/network blips. Retry with backoff + a clean between
          # attempts so a transient failure can't strand main. A genuine code error still fails all 3.
          set +e
          for attempt in 1 2 3; do
            trunk build --release && { echo "✅ build succeeded on attempt $attempt"; exit 0; }
            echo "::warning::trunk build failed (attempt $attempt/3) — likely a transient flake; backing off"
            trunk clean >/dev/null 2>&1 || true
            sleep $((attempt * 15))
          done
          echo "::error::trunk build failed after 3 attempts — this is a real build error, not a flake"
          exit 1
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

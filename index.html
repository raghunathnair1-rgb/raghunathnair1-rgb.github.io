  <script>
  (function () {
    var c = document.getElementById('matrix'); if (!c) return;

    var glyphs = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎ0123456789<>{}[]=/#*+-¦｜'.split('');
    var fs = 15, cols, drops = [], spd = [], trail = [];
    function resize() {
      var dpr = window.devicePixelRatio || 1;
      c.width = window.innerWidth * dpr; c.height = window.innerHeight * dpr;
      c.style.width = window.innerWidth + 'px'; c.style.height = window.innerHeight + 'px';
      x.setTransform(dpr, 0, 0, dpr, 0, 0);
      var old = cols || 0; cols = Math.ceil(window.innerWidth / fs);
      for (var i = old; i < cols; i++) { drops[i] = Math.random() * window.innerHeight / fs; spd[i] = 0.45 + Math.random() * 0.95; trail[i] = ' '; }
      drops.length = spd.length = trail.length = cols;
    }
    resize(); var rt; window.addEventListener('resize', function(){ clearTimeout(rt); rt = setTimeout(resize, 150); });
    function g() { return glyphs[(Math.random() * glyphs.length) | 0]; }
    function draw() {
      if (document.hidden) return;   // background tab: keep the interval alive but skip the canvas fill/glyph passes
      var amber = document.documentElement.getAttribute('data-theme') === 'amber';
      var trailColor = amber ? '#d98a1a' : '#31c96a', headColor = amber ? '#ffe9c2' : '#e8fff1';
      x.fillStyle = 'rgba(8,14,10,0.10)'; x.fillRect(0, 0, c.width, c.height); // green-tinted trail fade
      x.font = fs + 'px monospace';
      for (var i = 0; i < cols; i++) {
        var yr = drops[i] | 0, xp = i * fs, ch = g();
        x.fillStyle = trailColor; x.fillText(trail[i], xp, (yr - 1) * fs);   // theme-tinted trail cell
        x.fillStyle = headColor; x.fillText(ch, xp, yr * fs);              // theme-tinted bright head
        trail[i] = ch;
        drops[i] += spd[i];
        if (yr * fs > c.height && Math.random() > 0.962) { drops[i] = 0; spd[i] = 0.45 + Math.random() * 0.95; }
      }
    }
    var reduce = false;
    try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}

  })();

  <script>
  // Weather-reactive sky: pipe the live wttr.in condition into a canvas particle layer
  // (rain / storm / snow / fog / clear) behind the content. Same source as the weather
  // widget, made physical. Respects reduced-motion; fails to a calm 'clear' on any error.
  (function () {
    var reduce = false;
    try { reduce = matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
    var c = document.getElementById('sky'); if (!c || reduce) { if (c) c.style.display = 'none'; return; }
    var x = c.getContext('2d');
    var W, H, mode = '', parts = [], flash = 0;
    function rnd(a, b) { return a + Math.random() * (b - a); }
    function classify(desc) {
      desc = (desc || '').toLowerCase();
      if (/thunder|storm/.test(desc)) return 'storm';
      if (/snow|sleet|blizzard|ice|icy|flurr/.test(desc)) return 'snow';
      if (/rain|drizzle|shower/.test(desc)) return 'rain';
      if (/fog|mist|haze|smoke/.test(desc)) return 'fog';
      return 'clear';
    }
    function seed() {
      parts = [];
      var n = { storm: 320, rain: 200, snow: 150, fog: 7, clear: 26 }[mode] || 26;
      for (var i = 0; i < n; i++) {
        if (mode === 'rain' || mode === 'storm') {
          parts.push({ x: Math.random() * W, y: Math.random() * H, l: rnd(9, mode === 'storm' ? 24 : 16), v: rnd(9, mode === 'storm' ? 20 : 14), w: rnd(0.5, 1.3) });
        } else if (mode === 'snow') {
          parts.push({ x: Math.random() * W, y: Math.random() * H, r: rnd(0.8, 2.6), v: rnd(0.5, 1.6), d: rnd(-0.5, 0.5), p: Math.random() * 6.28 });
        } else if (mode === 'fog') {
          parts.push({ x: Math.random() * W, y: rnd(0, H), r: rnd(120, 300), v: rnd(0.15, 0.5), a: rnd(0.02, 0.06) });
        } else {
          parts.push({ x: Math.random() * W, y: Math.random() * H, r: rnd(0.5, 1.6), v: rnd(0.1, 0.4), d: rnd(-0.3, 0.3), p: Math.random() * 6.28 });
        }
      }
    }
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; if (mode) seed(); }
    var _skf = 0;
    function frame() {
      if ((_skf ^= 1)) { requestAnimationFrame(frame); return; }  // ~30fps: halve main-thread cost for INP
      x.clearRect(0, 0, W, H);
      var i, p;
      if (mode === 'rain' || mode === 'storm') {
        x.strokeStyle = 'rgba(80,255,150,0.5)'; x.lineCap = 'round';
        var sx = mode === 'storm' ? 2.2 : 1.2;
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; x.lineWidth = p.w;
          x.beginPath(); x.moveTo(p.x, p.y); x.lineTo(p.x - sx, p.y + p.l); x.stroke();
          p.y += p.v; p.x -= sx * 0.25;
          if (p.y > H) { p.y = -p.l; p.x = Math.random() * W; }
        }
        if (mode === 'storm') {
          if (flash > 0) { x.fillStyle = 'rgba(180,255,210,' + (flash * 0.1) + ')'; x.fillRect(0, 0, W, H); flash--; }
          else if (Math.random() < 0.006) { flash = 3; }
        }
      } else if (mode === 'snow') {
        x.fillStyle = '#e0ffe8';
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; p.p += 0.02; p.x += Math.sin(p.p) * 0.6 + p.d; p.y += p.v;
          if (p.y > H) { p.y = -3; p.x = Math.random() * W; }
          x.globalAlpha = 0.5 + p.r / 6;
          x.beginPath(); x.arc(p.x, p.y, p.r, 0, 6.2832); x.fill();
        }
        x.globalAlpha = 1;
      } else if (mode === 'fog') {
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; p.x += p.v; if (p.x - p.r > W) { p.x = -p.r; p.y = Math.random() * H; }
          var g = x.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
          g.addColorStop(0, 'rgba(120,210,150,' + p.a + ')'); g.addColorStop(1, 'rgba(120,210,150,0)');
          x.fillStyle = g; x.beginPath(); x.arc(p.x, p.y, p.r, 0, 6.2832); x.fill();
        }
      } else {
        x.fillStyle = 'rgba(200,255,220,0.5)';
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; p.p += 0.01; p.x += Math.sin(p.p) * 0.3 + p.d * 0.3; p.y -= p.v * 0.3;
          if (p.y < -2) { p.y = H + 2; p.x = Math.random() * W; }

      #else
      precision mediump float;
      #endif
      uniform float u_time; uniform vec2 u_res; uniform float u_run; uniform float u_fail;
      float sdHex(vec2 p, float r){
        const vec3 k=vec3(-0.866025404,0.5,0.577350269);
        p=abs(p);
        p-=2.0*min(dot(k.xy,p),0.0)*k.xy;
        p-=vec2(clamp(p.x,-k.z*r,k.z*r), r);
        return length(p)*sign(p.y);
      }
      void main(){
        vec2 P=(gl_FragCoord.xy-0.5*u_res)/u_res.y; float t=u_time;
        float asp=u_res.x/u_res.y;
        float halfW=asp*0.5-0.16;
        float run=u_run, fail=u_fail;
        float speed=mix(1.6, 3.4, run);
        float dy=abs(P.y);
        float inX=smoothstep(-halfW-0.06,-halfW+0.03,P.x)*(1.0-smoothstep(halfW-0.03,halfW+0.06,P.x));
        float tube=smoothstep(0.042,0.006,dy)*inX;
        float tglow=smoothstep(0.14,0.0,dy)*inX;
        // buttery flow: 3 harmonics, faster + brighter while a build runs
        float flow=pow(0.5+0.5*sin((P.x - t*speed)*7.0), 8.0)
                 + pow(0.5+0.5*sin((P.x - t*speed*1.4)*11.0 + 1.5), 12.0)*0.7
                 + pow(0.5+0.5*sin((P.x - t*speed*0.75)*5.0 - 0.8), 6.0)*0.5;
        flow *= (0.8 + run*0.9);
        float march=mix(1.5, 2.6, run);            // the highlight glides faster while a build runs
        float hotPos=mod(t*march, 6.0);            // the 'active node' — ALWAYS visible, gliding through
        float hex=0.0, scanHot=0.0, hglow=0.0, redN=0.0;

          float fi=float(i);

          vec2 q=P-vec2(nx,0.0);
          float hd=sdHex(q, 0.066);   // bigger hexagons
          float outline=smoothstep(0.011,0.0,abs(hd));
          float fillc=smoothstep(0.006,-0.025,hd);
          hex += outline + fillc*0.35;                          // the static green hexagon
          float scan=1.0-smoothstep(0.0,0.85,abs(fi-hotPos));   // bright on the current active node
          scanHot += (outline*1.4 + fillc)*scan;
          hglow += smoothstep(0.17,0.0,length(q))*(0.1 + scan*0.8);
          if(i==5){ redN=(outline+fillc*1.5)*fail; }

        vec3 g=vec3(0.0,1.0,0.30), br=vec3(0.6,1.0,0.75), red=vec3(1.0,0.22,0.16);
        vec3 hotcol=mix(vec3(0.5,1.0,0.7), vec3(1.0,0.72,0.22), run);   // bright green-white idle -> amber building
        vec3 col=g*(tube*0.55+tglow*0.22)
               + br*flow*tube*1.7
               + g*hex*0.8
               + hotcol*(scanHot*1.8 + hglow*0.5)
               + red*redN*1.6;
        col=col/(1.0+col*0.55);
        gl_FragColor=vec4(col,1.0);
      }`;
    var gl=null,prog=null,uT,uR,uRun,uFail,bound=null,t0=performance.now(),ok=false;

      prog=gl.createProgram(); gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
      if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){ c.style.display='none'; return false; }
      gl.useProgram(prog);
      var buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
      gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);

      uT=gl.getUniformLocation(prog,'u_time'); uR=gl.getUniformLocation(prog,'u_res');
      uRun=gl.getUniformLocation(prog,'u_run'); uFail=gl.getUniformLocation(prog,'u_fail');
      return true;
    }
    function frame(now){
      requestAnimationFrame(frame);
      var c=document.getElementById('pipe-gl');
      if(!c){ bound=null; return; }
      if(c!==bound){ bound=c; ok=init(c); }
      if(!ok||!gl) return;
      var r=c.getBoundingClientRect(); var dpr=Math.min(window.devicePixelRatio||1,2);
      var w=Math.max(2,(r.width*dpr)|0), h=Math.max(2,(r.height*dpr)|0);
      if(c.width!==w||c.height!==h){ c.width=w; c.height=h; }
      gl.viewport(0,0,c.width,c.height);
      var t=reduce?3.0:(now-t0)/1000.0;
      var run=c.getAttribute('data-run')==='1'?1.0:0.0, fail=c.getAttribute('data-fail')==='1'?1.0:0.0;
      gl.uniform1f(uT,t); gl.uniform2f(uR,c.width,c.height); gl.uniform1f(uRun,run); gl.uniform1f(uFail,fail);
      gl.drawArrays(gl.TRIANGLES,0,3);
    }
    requestAnimationFrame(frame);
  })();

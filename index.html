  <div id="boot"><pre></pre></div>
  <script>
  (function () {
    var boot = document.getElementById('boot');
    if (!boot) return;
    var pre = boot.querySelector('pre');
    var seen = false, reduce = false;
    try { seen = sessionStorage.getItem('booted') === '1'; } catch (e) {}
    try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
    if (seen || reduce) { if (boot.parentNode) boot.parentNode.removeChild(boot); return; }
    var lines = [
      'dark-factory BIOS v4.8 — POST',
      '──────────────────────',
      '[ OK ] cpu: brain @ ∞GHz',
      '[ OK ] memory ............ 128GB unified',
      '[ OK ] gpu ............... NVIDIA GB10',
      '[ OK ] mount /dev/rust ... wasm32',
      '[ OK ] modules ........... matrix_rain, terminal, clock',
      '[ OK ] security gates .... armed',
      '[ OK ] coffee ............ brewed ☕'
    ];
    var out = [];
    function render() { pre.textContent = out.join('\n'); }
    var i = 0;
    function typeLines() {
      if (i < lines.length) {
        out.push(lines[i]); i++; render();
        setTimeout(typeLines, 100 + Math.random() * 80);
      } else { progress(); }
    }
    function progress() {
      var idx = out.length; out.push(''); var f = 0;
      (function bar() {
        var fill = Math.min(f, 20);
        out[idx] = 'loading kernel  [' + '█'.repeat(fill) + '░'.repeat(20 - fill) + '] ' + (fill * 5) + '%';
        render();
        if (f < 20) { f++; setTimeout(bar, 55); } else { finish(); }
      })();
    }
    function finish() {
      out.push(''); out.push('boot complete. launching raghu // dark-factory'); render();
      boot.classList.add('boot-typed');
      setTimeout(function () {
        boot.classList.add('boot-done');
        setTimeout(function () { if (boot.parentNode) boot.parentNode.removeChild(boot); }, 700);
      }, 1100);
    }
    function bootSound() {
      try {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        var ctx = new AC();
        var played = false;
        function fire() {
          if (played || ctx.state !== 'running') return;
          played = true;
          var t0 = ctx.currentTime + 0.05;
          // subtle CRT/PSU hum: low sine drone + faint 2nd harmonic, swelling then fading
          [[58, 0.05], [116, 0.02]].forEach(function (h) {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = h[0];
            g.gain.setValueAtTime(0.0001, t0);
            g.gain.exponentialRampToValueAtTime(h[1], t0 + 0.4);
            g.gain.setValueAtTime(h[1], t0 + 1.8);
            g.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.7);
            o.connect(g); g.connect(ctx.destination);
            o.start(t0); o.stop(t0 + 2.9);
          });
          // rising chime arpeggio over the hum
          [523.25, 659.25, 783.99, 1046.50].forEach(function (f, i) {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'triangle'; o.frequency.value = f;
            var t = t0 + 0.18 + i * 0.12;
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.13, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
            o.connect(g); g.connect(ctx.destination);
            o.start(t); o.stop(t + 0.6);
          });
          setTimeout(function () { try { ctx.close(); } catch (e) {} }, 3400);
        }
        // try now; if autoplay-blocked, fire on the first user interaction
        if (ctx.state === 'running') fire();
        else if (ctx.resume) ctx.resume().then(fire).catch(function () {});
        var unlock = function () { if (ctx.resume) ctx.resume().then(fire).catch(function () {}); else fire(); };
        document.addEventListener('pointerdown', unlock, { once: true });
        document.addEventListener('keydown', unlock, { once: true });
      } catch (e) {}
    }
    // browsers block autoplay audio -> a "power on" tap provides the gesture,
    // so the hum + chime play in sync with the boot from the very start.
    pre.textContent = '  ▶ press any key or click to power on';
    boot.classList.add('boot-idle');
    var started = false;
    function powerOn() {
      if (started) return; started = true;
      document.removeEventListener('pointerdown', powerOn);
      document.removeEventListener('keydown', powerOn);
      try { sessionStorage.setItem('booted', '1'); } catch (e) {}
      boot.classList.remove('boot-idle');
      pre.textContent = ''; out = []; i = 0;
      bootSound();
      typeLines();
    }
    document.addEventListener('pointerdown', powerOn, { once: true });
    document.addEventListener('keydown', powerOn, { once: true });
  })();
  </script>

  <script>
  (function () {
    var c = document.getElementById('matrix'); if (!c) return;
    var x = c.getContext('2d');
    var glyphs = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎ0123456789<>{}[]=/#*+-¦｜'.split('');
    var fs = 15, cols, drops, spd, trail;
    function resize() {
      c.width = window.innerWidth; c.height = window.innerHeight;
      cols = Math.ceil(c.width / fs); drops = []; spd = []; trail = [];
      for (var i = 0; i < cols; i++) { drops[i] = Math.random() * c.height / fs; spd[i] = 0.45 + Math.random() * 0.95; trail[i] = ' '; }
    }
    resize(); window.addEventListener('resize', resize);
    function g() { return glyphs[(Math.random() * glyphs.length) | 0]; }
    function draw() {
      x.fillStyle = 'rgba(8,14,10,0.10)'; x.fillRect(0, 0, c.width, c.height); // green-tinted trail fade
      x.font = fs + 'px monospace';
      for (var i = 0; i < cols; i++) {
        var yr = drops[i] | 0, xp = i * fs, ch = g();
        x.fillStyle = '#31c96a'; x.fillText(trail[i], xp, (yr - 1) * fs);   // green trail cell
        x.fillStyle = '#e8fff1'; x.fillText(ch, xp, yr * fs);              // bright white-green head
        trail[i] = ch;
        drops[i] += spd[i];
        if (yr * fs > c.height && Math.random() > 0.962) { drops[i] = 0; spd[i] = 0.45 + Math.random() * 0.95; }
      }
    }
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) setInterval(draw, 45);
  })();
  </script>
  <script>
  // Weather-reactive sky: pipe the live wttr.in condition into a canvas particle layer
  // (rain / storm / snow / fog / clear) behind the content. Same source as the weather
  // widget, made physical. Respects reduced-motion; fails to a calm 'clear' on any error.
  (function () {
    var reduce = false;
    try { reduce = matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
    var c = document.getElementById('sky'); if (!c || reduce) { if (c) c.style.display = 'none'; return; }
    var x = c.getContext('2d');
    var W, H, mode = '', parts = [], flash = 0;
    function rnd(a, b) { return a + Math.random() * (b - a); }
    function classify(desc) {
      desc = (desc || '').toLowerCase();
      if (/thunder|storm/.test(desc)) return 'storm';
      if (/snow|sleet|blizzard|ice|icy|flurr/.test(desc)) return 'snow';
      if (/rain|drizzle|shower/.test(desc)) return 'rain';
      if (/fog|mist|haze|smoke/.test(desc)) return 'fog';
      return 'clear';
    }
    function seed() {
      parts = [];
      var n = { storm: 320, rain: 200, snow: 150, fog: 7, clear: 26 }[mode] || 26;
      for (var i = 0; i < n; i++) {
        if (mode === 'rain' || mode === 'storm') {
          parts.push({ x: Math.random() * W, y: Math.random() * H, l: rnd(9, mode === 'storm' ? 24 : 16), v: rnd(9, mode === 'storm' ? 20 : 14), w: rnd(0.5, 1.3) });
        } else if (mode === 'snow') {
          parts.push({ x: Math.random() * W, y: Math.random() * H, r: rnd(0.8, 2.6), v: rnd(0.5, 1.6), d: rnd(-0.5, 0.5), p: Math.random() * 6.28 });
        } else if (mode === 'fog') {
          parts.push({ x: Math.random() * W, y: rnd(0, H), r: rnd(120, 300), v: rnd(0.15, 0.5), a: rnd(0.02, 0.06) });
        } else {
          parts.push({ x: Math.random() * W, y: Math.random() * H, r: rnd(0.5, 1.6), v: rnd(0.1, 0.4), d: rnd(-0.3, 0.3), p: Math.random() * 6.28 });
        }
      }
    }
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; if (mode) seed(); }
    function frame() {
      x.clearRect(0, 0, W, H);
      var i, p;
      if (mode === 'rain' || mode === 'storm') {
        x.strokeStyle = 'rgba(150,200,225,0.55)'; x.lineCap = 'round';
        var sx = mode === 'storm' ? 2.2 : 1.2;
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; x.lineWidth = p.w;
          x.beginPath(); x.moveTo(p.x, p.y); x.lineTo(p.x - sx, p.y + p.l); x.stroke();
          p.y += p.v; p.x -= sx * 0.25;
          if (p.y > H) { p.y = -p.l; p.x = Math.random() * W; }
        }
        if (mode === 'storm') {
          if (flash > 0) { x.fillStyle = 'rgba(200,220,255,' + (flash * 0.1) + ')'; x.fillRect(0, 0, W, H); flash--; }
          else if (Math.random() < 0.006) { flash = 3; }
        }
      } else if (mode === 'snow') {
        x.fillStyle = '#ffffff';
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; p.p += 0.02; p.x += Math.sin(p.p) * 0.6 + p.d; p.y += p.v;
          if (p.y > H) { p.y = -3; p.x = Math.random() * W; }
          x.globalAlpha = 0.5 + p.r / 6;
          x.beginPath(); x.arc(p.x, p.y, p.r, 0, 6.2832); x.fill();
        }
        x.globalAlpha = 1;
      } else if (mode === 'fog') {
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; p.x += p.v; if (p.x - p.r > W) { p.x = -p.r; p.y = Math.random() * H; }
          var g = x.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
          g.addColorStop(0, 'rgba(185,195,205,' + p.a + ')'); g.addColorStop(1, 'rgba(185,195,205,0)');
          x.fillStyle = g; x.beginPath(); x.arc(p.x, p.y, p.r, 0, 6.2832); x.fill();
        }
      } else {
        x.fillStyle = 'rgba(200,255,220,0.5)';
        for (i = 0; i < parts.length; i++) {
          p = parts[i]; p.p += 0.01; p.x += Math.sin(p.p) * 0.3 + p.d * 0.3; p.y -= p.v * 0.3;
          if (p.y < -2) { p.y = H + 2; p.x = Math.random() * W; }
          x.globalAlpha = 0.3 + p.r / 4;
          x.beginPath(); x.arc(p.x, p.y, p.r, 0, 6.2832); x.fill();
        }
        x.globalAlpha = 1;
      }
      requestAnimationFrame(frame);
    }
    resize(); addEventListener('resize', resize);
    mode = 'clear'; seed(); requestAnimationFrame(frame);
    try {
      fetch('https://wttr.in/?format=j1').then(function (r) { return r.json(); }).then(function (d) {
        var cc = d.current_condition[0];
        mode = classify(cc.weatherDesc[0].value);
        try { document.documentElement.dataset.sky = mode; } catch (e) {}
        seed();
      }).catch(function () {});
    } catch (e) {}
  })();
  </script>
  <script>
  // Cinematic WebGL CRT shader overlay (curvature vignette, scanlines, rolling bar,
  // phosphor tint, chromatic fringe, flicker, grain) blended over the page.
  (function () {
    var reduce = false;
    try { reduce = matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
    var cv = document.getElementById('crtfx');
    if (!cv || reduce) { if (cv) cv.style.display = 'none'; return; }
    var gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
    if (!gl) { cv.style.display = 'none'; return; }
    function resize() { cv.width = innerWidth; cv.height = innerHeight; gl.viewport(0, 0, cv.width, cv.height); }
    var VS = 'attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }';
    var FS = `precision mediump float;
      uniform float u_time; uniform vec2 u_res;
      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      void main(){
        vec2 uv = gl_FragCoord.xy / u_res.xy;
        vec2 p = uv*2.0-1.0;
        float v = clamp(1.0 - dot(p*0.85, p*0.85), 0.0, 1.0); v = pow(v, 0.62);
        float sl = mix(1.0, 0.5+0.5*sin(gl_FragCoord.y*2.0 - u_time*26.0), 0.24);
        float roll = fract(uv.y + u_time*0.06);
        float bar = smoothstep(0.0,0.05,roll)*(1.0-smoothstep(0.05,0.12,roll))*0.16;
        float fl = 1.0 + 0.028*sin(u_time*50.0);
        float g = (hash(gl_FragCoord.xy + fract(u_time*13.0))-0.5)*0.08;
        float lum = 0.5; lum *= v; lum *= sl; lum *= fl; lum += bar; lum += g;
        float ca = length(p)*0.035;
        vec3 col = vec3(lum); col.r *= 1.0-ca; col.b *= 1.0+ca; col *= vec3(0.98,1.0,0.99);
        gl_FragColor = vec4(col, 1.0);
      }`;
    function sh(t, src) { var s = gl.createShader(t); gl.shaderSource(s, src); gl.compileShader(s); return s; }
    var prog = gl.createProgram();
    gl.attachShader(prog, sh(gl.VERTEX_SHADER, VS));
    gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog); gl.useProgram(prog);
    var buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, 'a'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    var uT = gl.getUniformLocation(prog, 'u_time'), uR = gl.getUniformLocation(prog, 'u_res');
    resize(); addEventListener('resize', resize);
    var t0 = performance.now();
    (function frame() {
      var t = (performance.now() - t0) / 1000;
      gl.uniform1f(uT, t); gl.uniform2f(uR, cv.width, cv.height);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(frame);
    })();
  })();
  </script>

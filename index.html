<body>
  <div id="boot"><pre></pre></div>
  <script>
  (function () {
    var boot = document.getElementById('boot');
    if (!boot) return;
    var pre = boot.querySelector('pre');
    var seen = false, reduce = false;
    try { seen = sessionStorage.getItem('booted') === '1'; } catch (e) {}
    try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
    if (seen || reduce) { if (boot.parentNode) boot.parentNode.removeChild(boot); return; }
    var lines = [
      'dark-factory BIOS v4.8 — POST',
      '──────────────────────',
      '[ OK ] cpu: brain @ ∞GHz',
      '[ OK ] memory ............ 128GB unified',
      '[ OK ] gpu ............... NVIDIA GB10',
      '[ OK ] mount /dev/rust ... wasm32',
      '[ OK ] modules ........... matrix_rain, terminal, clock',
      '[ OK ] security gates .... armed',
      '[ OK ] coffee ............ brewed ☕'
    ];
    var out = [];
    function render() { pre.textContent = out.join('\n'); }
    var i = 0;
    function typeLines() {
      if (i < lines.length) {
        out.push(lines[i]); i++; render();
        setTimeout(typeLines, 100 + Math.random() * 80);
      } else { progress(); }
    }
    function progress() {
      var idx = out.length; out.push(''); var f = 0;
      (function bar() {
        var fill = Math.min(f, 20);
        out[idx] = 'loading kernel  [' + '█'.repeat(fill) + '░'.repeat(20 - fill) + '] ' + (fill * 5) + '%';
        render();
        if (f < 20) { f++; setTimeout(bar, 55); } else { finish(); }
      })();
    }
    function finish() {
      out.push(''); out.push('boot complete. launching raghu // dark-factory'); render();
      boot.classList.add('boot-typed');
      setTimeout(function () {
        boot.classList.add('boot-done');
        setTimeout(function () { if (boot.parentNode) boot.parentNode.removeChild(boot); }, 700);
      }, 1100);
    }
    function bootSound() {
      try {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        var ctx = new AC();
        var played = false;
        function fire() {
          if (played || ctx.state !== 'running') return;
          played = true;
          var t0 = ctx.currentTime + 0.05;
          // subtle CRT/PSU hum: low sine drone + faint 2nd harmonic, swelling then fading
          [[58, 0.05], [116, 0.02]].forEach(function (h) {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = h[0];
            g.gain.setValueAtTime(0.0001, t0);
            g.gain.exponentialRampToValueAtTime(h[1], t0 + 0.4);
            g.gain.setValueAtTime(h[1], t0 + 1.8);
            g.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.7);
            o.connect(g); g.connect(ctx.destination);
            o.start(t0); o.stop(t0 + 2.9);
          });
          // rising chime arpeggio over the hum
          [523.25, 659.25, 783.99, 1046.50].forEach(function (f, i) {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'triangle'; o.frequency.value = f;
            var t = t0 + 0.18 + i * 0.12;
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.13, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
            o.connect(g); g.connect(ctx.destination);
            o.start(t); o.stop(t + 0.6);
          });
          setTimeout(function () { try { ctx.close(); } catch (e) {} }, 3400);
        }
        // try now; if autoplay-blocked, fire on the first user interaction
        if (ctx.state === 'running') fire();
        else if (ctx.resume) ctx.resume().then(fire).catch(function () {});
        var unlock = function () { if (ctx.resume) ctx.resume().then(fire).catch(function () {}); else fire(); };
        document.addEventListener('pointerdown', unlock, { once: true });
        document.addEventListener('keydown', unlock, { once: true });
      } catch (e) {}
    }
    // browsers block autoplay audio -> a "power on" tap provides the gesture,
    // so the hum + chime play in sync with the boot from the very start.
    pre.textContent = '  ▶ press any key or click to power on';
    boot.classList.add('boot-idle');
    var started = false;
    function powerOn() {
      if (started) return; started = true;
      document.removeEventListener('pointerdown', powerOn);
      document.removeEventListener('keydown', powerOn);
      try { sessionStorage.setItem('booted', '1'); } catch (e) {}
      boot.classList.remove('boot-idle');
      pre.textContent = ''; out = []; i = 0;
      bootSound();
      typeLines();
    }
    document.addEventListener('pointerdown', powerOn, { once: true });
    document.addEventListener('keydown', powerOn, { once: true });
  })();
  </script>
  <canvas id="matrix"></canvas>
  <div id="app"></div>
  <script>
  (function () {
    var c = document.getElementById('matrix'); if (!c) return;
    var x = c.getContext('2d');
    var glyphs = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃ0123456789<>{}[]=/#*+-'.split('');
    var fs = 14, cols, drops;
    function resize() {
      c.width = window.innerWidth; c.height = window.innerHeight;
      cols = Math.ceil(c.width / fs); drops = [];
      for (var i = 0; i < cols; i++) drops[i] = Math.random() * c.height / fs;
    }
    resize(); window.addEventListener('resize', resize);
    function draw() {
      x.fillStyle = 'rgba(10,14,20,0.09)'; x.fillRect(0, 0, c.width, c.height);
      x.fillStyle = '#4ade80'; x.font = fs + 'px monospace';
      for (var i = 0; i < drops.length; i++) {
        x.fillText(glyphs[Math.floor(Math.random() * glyphs.length)], i * fs, drops[i] * fs);
        if (drops[i] * fs > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) setInterval(draw, 55);
  })();
  </script>
